environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
